version: '3.8'

services:
  mysql:
    image: docker.1ms.run/library/mysql:8.0
    container_name: devops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: devops
      MYSQL_USER: devops
      MYSQL_PASSWORD: devops123
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - devops-network

  redis:
    image: docker.1ms.run/library/redis:7-alpine
    container_name: devops-redis
    command: redis-server --requirepass redis123
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - devops-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops-backend
    ports:
      - "8000:8000"
    environment:
      DEVOPS_SERVER_PORT: "8000"
      DEVOPS_DB_HOST: mysql
      DEVOPS_DB_PORT: "3306"
      DEVOPS_DB_USERNAME: devops
      DEVOPS_DB_PASSWORD: devops123
      DEVOPS_DB_DB: devops
      DEVOPS_REDIS_ADDR: redis:6379
      DEVOPS_REDIS_PASSWORD: redis123
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - devops-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devops-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devops-network

volumes:
  mysql-data:
  redis-data:

networks:
  devops-network:
    driver: bridge
