basePath: /api/v1
definitions:
  api.ClusterCreateResponse:
    properties:
      data:
        properties:
          authType:
            example: kubeconfig
            type: string
          id:
            example: 1
            type: integer
          name:
            example: k8s-prod-01
            type: string
          status:
            example: healthy
            type: string
          url:
            example: https://1.2.3.4:6443
            type: string
        type: object
      message:
        example: 添加集群成功
        type: string
    type: object
  api.ClusterDeleteResponse:
    properties:
      message:
        example: 删除集群成功
        type: string
    type: object
  api.ClusterHealthResponse:
    properties:
      data:
        properties:
          error:
            example: ""
            type: string
          healthy:
            example: true
            type: boolean
          status:
            example: healthy
            type: string
        type: object
      message:
        example: 健康检查成功
        type: string
    type: object
  api.ClusterListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/api.ClusterResponse'
        type: array
      message:
        example: 获取成功
        type: string
      page:
        example: 1
        type: integer
      pageSize:
        example: 10
        type: integer
      total:
        example: 100
        type: integer
    type: object
  api.ClusterResponse:
    properties:
      authType:
        example: kubeconfig
        type: string
      createdAt:
        example: "2023-01-01T00:00:00Z"
        type: string
      env:
        example: prod
        type: string
      id:
        example: 1
        type: integer
      isDefault:
        example: false
        type: boolean
      k8sVersion:
        example: v1.24.0
        type: string
      labels:
        example: '{"env":"prod"}'
        type: string
      name:
        example: k8s-prod-01
        type: string
      nodeCount:
        example: 3
        type: integer
      remark:
        example: 备注信息
        type: string
      status:
        example: healthy
        type: string
      updatedAt:
        example: "2023-01-01T00:00:00Z"
        type: string
      url:
        example: https://1.2.3.4:6443
        type: string
    type: object
  api.CordonNodeRequest:
    properties:
      clusterName:
        type: string
      cordon:
        description: true=不可调度, false=可调度
        type: boolean
      name:
        type: string
    required:
    - clusterName
    - name
    type: object
  api.DrainNodeRequest:
    properties:
      clusterName:
        type: string
      deleteLocalData:
        type: boolean
      force:
        type: boolean
      gracePeriodSeconds:
        type: integer
      ignoreDaemonSets:
        type: boolean
      name:
        type: string
    required:
    - clusterName
    - name
    type: object
  api.K8sObject:
    additionalProperties: true
    type: object
  api.Response:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      message:
        example: Success
        type: string
    type: object
  api.UpdateLabelsRequest:
    properties:
      clusterName:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
      name:
        type: string
    required:
    - clusterName
    - labels
    - name
    type: object
  api.UpdateTaintsRequest:
    properties:
      clusterName:
        type: string
      name:
        type: string
      taints:
        items: {}
        type: array
    required:
    - clusterName
    - name
    - taints
    type: object
  model.AppConfig:
    properties:
      appId:
        type: integer
      appState:
        description: 应用状态：pending/online
        type: string
      createdAt:
        type: string
      description:
        description: 描述
        type: string
      developers:
        description: 开发负责人
        type: string
      domain:
        description: 域名
        type: string
      gitAddress:
        description: Git地址
        type: string
      healthCheck:
        description: 健康检查接口
        type: string
      id:
        type: integer
      instanceType:
        description: 实例类型：container/native
        type: string
      language:
        description: 开发语言
        type: string
      name:
        type: string
      owner:
        description: 运维负责人
        type: string
      port:
        description: 服务端口
        type: integer
      status:
        description: 运行状态：running/offline
        type: string
      testers:
        description: 测试负责人
        type: string
      updatedAt:
        type: string
    type: object
  model.BuildConfig:
    properties:
      appId:
        type: integer
      buildConfig:
        type: string
      buildEnv:
        type: string
      buildTool:
        type: string
      createdAt:
        type: string
      customConfig:
        type: string
      dockerfile:
        type: string
      id:
        type: integer
      updatedAt:
        type: string
    type: object
  model.BuildEnv:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      type:
        type: string
      updatedAt:
        type: string
      version:
        type: string
    type: object
  model.ContainerConfigRequest:
    properties:
      appId:
        type: integer
      cpuLimit:
        type: string
      cpuRequest:
        type: string
      envVars:
        type: string
      environment:
        type: string
      id:
        type: integer
      image:
        type: string
      memoryLimit:
        type: string
      memoryRequest:
        type: string
      mountPaths:
        type: string
      namespace:
        type: string
    required:
    - appId
    - environment
    type: object
  model.DeleteContainerConfigRequest:
    properties:
      appId:
        type: integer
      environment:
        type: string
    required:
    - appId
    - environment
    type: object
  model.DeleteDeployConfigRequest:
    properties:
      appId:
        type: integer
      environment:
        type: string
    required:
    - appId
    - environment
    type: object
  model.DeleteEnumRequest:
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  model.DeleteRequest:
    properties:
      id:
        description: ID
        type: integer
    required:
    - id
    type: object
  model.DeployConfigRequest:
    properties:
      appId:
        type: integer
      clusterName:
        type: string
      cpuLimit:
        type: string
      cpuRequest:
        type: string
      envVars:
        type: string
      environment:
        type: string
      id:
        type: integer
      memoryLimit:
        type: string
      memoryRequest:
        type: string
      replicas:
        type: integer
      servicePort:
        type: integer
    required:
    - appId
    - environment
    type: object
  model.EnumRequest:
    properties:
      enumKey:
        type: string
      enumType:
        type: string
      enumValue:
        type: string
      id:
        type: integer
      isActive:
        type: boolean
      sortOrder:
        type: integer
    required:
    - enumKey
    - enumType
    - enumValue
    type: object
  model.Permission:
    properties:
      action:
        description: e.g., "create", "read", "update", "delete"
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      resource:
        description: e.g., "cluster", "user"
        type: string
      updatedAt:
        type: string
    type: object
  model.StatusToggleRequest:
    properties:
      id:
        description: 应用ID
        type: integer
      status:
        description: 目标状态：running/offline
        type: string
    required:
    - id
    - status
    type: object
  model.TechStackConfig:
    properties:
      appId:
        type: integer
      baseImage:
        type: string
      buildImage:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      language:
        type: string
      name:
        type: string
      runtimeImage:
        type: string
      updatedAt:
        type: string
      version:
        type: string
    type: object
  service.ChangePasswordRequest:
    properties:
      newPassword:
        minLength: 8
        type: string
      oldPassword:
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  service.CreateDepartmentRequest:
    properties:
      name:
        type: string
      parentId:
        type: integer
    required:
    - name
    type: object
  service.CreateDeptUserRequest:
    properties:
      departmentId:
        type: integer
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      status:
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  service.CreatePermissionRequest:
    properties:
      action:
        type: string
      description:
        type: string
      name:
        type: string
      resource:
        type: string
    required:
    - action
    - name
    - resource
    type: object
  service.CreateRequest:
    properties:
      authType:
        description: '"kubeconfig" 或 "token"'
        example: kubeconfig
        type: string
      caData:
        description: CA 证书（当 authType=token 时，可选）
        example: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...
        type: string
      env:
        description: 环境 (dev, test, prod)
        example: prod
        type: string
      kubeconfig:
        description: kubeconfig YAML（当 authType=kubeconfig 时）
        example: |-
          apiVersion: v1
          clusters:
          - cluster:
              server: https://1.2.3.4:6443
          ...
        type: string
      labels:
        description: 标签 (JSON 格式)
        example: '{"region":"shanghai","dept":"it"}'
        type: string
      name:
        description: 集群名称
        example: k8s-prod-01
        type: string
      remark:
        description: 备注
        example: 生产环境核心集群
        type: string
      token:
        description: Token（当 authType=token 时）
        example: eyJhbGciOiJSUzI1NiIsImtpZCI6In...
        type: string
      url:
        description: API Server 地址（当 authType=token 时）
        example: https://1.2.3.4:6443
        type: string
    type: object
  service.CreateRoleRequest:
    properties:
      dataScope:
        type: string
      description:
        type: string
      displayName:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  service.CreateTenantRequest:
    properties:
      code:
        type: string
      contactEmail:
        type: string
      contactName:
        type: string
      contactPhone:
        type: string
      description:
        type: string
      expiresAt:
        type: string
      logo:
        type: string
      maxDepartments:
        type: integer
      maxRoles:
        type: integer
      maxUsers:
        type: integer
      modules:
        type: string
      name:
        type: string
    required:
    - code
    - name
    type: object
  service.LoginRequest:
    properties:
      authType:
        description: local, ldap
        type: string
      password:
        type: string
      tenantCode:
        type: string
      username:
        type: string
    required:
    - password
    - tenantCode
    - username
    type: object
  service.NodeAllocatedResource:
    properties:
      cpuLimits:
        type: string
      cpuLimitsPercentage:
        type: string
      cpuRequests:
        type: string
      cpuRequestsPercentage:
        type: string
      ephemeralStorageLimits:
        type: string
      ephemeralStorageRequests:
        type: string
      hugepages1GiLimits:
        type: string
      hugepages1GiRequests:
        type: string
      hugepages2MiLimits:
        type: string
      hugepages2MiRequests:
        type: string
      memoryLimits:
        type: string
      memoryLimitsPercentage:
        type: string
      memoryRequests:
        type: string
      memoryRequestsPercentage:
        type: string
    type: object
  service.NodeDetail:
    properties:
      addresses:
        items: {}
        type: array
      age:
        type: string
      allocatable:
        $ref: '#/definitions/service.NodeResourceQuantity'
      allocatedResources:
        $ref: '#/definitions/service.NodeAllocatedResource'
      annotations:
        additionalProperties:
          type: string
        type: object
      capacity:
        $ref: '#/definitions/service.NodeResourceQuantity'
      conditions:
        items: {}
        type: array
      cpuCapacity:
        description: 资源统计
        type: string
      cpuUsage:
        description: 使用量 (Core)
        type: string
      createdAt:
        type: string
      creationTimestamp:
        description: 创建时间 (别名)
        type: string
      externalIP:
        description: 外部IP
        type: string
      images:
        items: {}
        type: array
      ip:
        type: string
      k8sVersion:
        description: Kubelet 版本 (别名)
        type: string
      kernelVersion:
        type: string
      kubeletVersion:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
      lease:
        $ref: '#/definitions/service.NodeLeaseInfo'
      memoryCapacity:
        type: string
      memoryUsage:
        description: 使用量 (Gi)
        type: string
      name:
        type: string
      osImage:
        description: 操作系统镜像
        type: string
      podCIDR:
        type: string
      podCIDRs:
        items:
          type: string
        type: array
      podCapacity:
        type: integer
      podCount:
        type: integer
      pods:
        $ref: '#/definitions/service.NodePodSummary'
      providerID:
        type: string
      role:
        description: master, worker
        type: string
      status:
        description: Ready, NotReady, Unknown
        type: string
      systemInfo: {}
      taints:
        items: {}
        type: array
      unschedulable:
        type: boolean
    type: object
  service.NodeLeaseInfo:
    properties:
      acquireTime:
        type: string
      holderIdentity:
        type: string
      renewTime:
        type: string
    type: object
  service.NodeListItem:
    properties:
      age:
        type: string
      cpuCapacity:
        description: 资源统计
        type: string
      cpuUsage:
        description: 使用量 (Core)
        type: string
      createdAt:
        type: string
      creationTimestamp:
        description: 创建时间 (别名)
        type: string
      externalIP:
        description: 外部IP
        type: string
      ip:
        type: string
      k8sVersion:
        description: Kubelet 版本 (别名)
        type: string
      kernelVersion:
        type: string
      kubeletVersion:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
      memoryCapacity:
        type: string
      memoryUsage:
        description: 使用量 (Gi)
        type: string
      name:
        type: string
      osImage:
        description: 操作系统镜像
        type: string
      podCapacity:
        type: integer
      podCount:
        type: integer
      role:
        description: master, worker
        type: string
      status:
        description: Ready, NotReady, Unknown
        type: string
      taints:
        items: {}
        type: array
      unschedulable:
        type: boolean
    type: object
  service.NodeListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/service.NodeListItem'
        type: array
      total:
        type: integer
    type: object
  service.NodePodItem:
    properties:
      age:
        type: string
      cpuLimit:
        type: string
      cpuRequest:
        type: string
      createdAt:
        type: string
      memoryLimit:
        type: string
      memoryRequest:
        type: string
      name:
        type: string
      namespace:
        type: string
      restartCount:
        type: integer
      status:
        type: string
    type: object
  service.NodePodSummary:
    properties:
      items:
        items:
          $ref: '#/definitions/service.NodePodItem'
        type: array
      total:
        type: integer
    type: object
  service.NodeResourceQuantity:
    properties:
      cpu:
        type: string
      ephemeralStorage:
        type: string
      hugepages1Gi:
        type: string
      hugepages2Mi:
        type: string
      memory:
        type: string
      pods:
        type: string
    type: object
  service.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  service.TransferUserDepartmentRequest:
    properties:
      toDepartmentId:
        type: integer
      userId:
        type: integer
    required:
    - toDepartmentId
    - userId
    type: object
  service.UpdateDepartmentRequest:
    properties:
      id:
        type: integer
      name:
        type: string
      parentId:
        type: integer
    required:
    - id
    type: object
  service.UpdateDeptUserRequest:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      status:
        type: string
    required:
    - id
    type: object
  service.UpdateRequest:
    properties:
      caData:
        description: 新的 CA
        example: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...
        type: string
      env:
        description: 环境
        example: prod
        type: string
      id:
        description: 集群ID
        example: 1
        type: integer
      kubeconfig:
        description: 新的 kubeconfig
        type: string
      labels:
        description: 标签
        example: '{"region":"shanghai","dept":"it"}'
        type: string
      name:
        description: 集群名称
        example: k8s-prod-01-new
        type: string
      remark:
        description: 备注
        example: 生产环境核心集群-已迁移
        type: string
      token:
        description: 新的 Token
        example: eyJhbGciOiJSUzI1NiIsImtpZCI6In...
        type: string
      url:
        description: 新的 URL
        example: https://1.2.3.4:6443
        type: string
    type: object
  service.UpdateRoleRequest:
    properties:
      dataScope:
        type: string
      description:
        type: string
      displayName:
        type: string
      id:
        type: integer
      name:
        type: string
      permissionIds:
        items:
          type: integer
        type: array
    required:
    - id
    type: object
  service.UpdateTenantRequest:
    properties:
      contactEmail:
        type: string
      contactName:
        type: string
      contactPhone:
        type: string
      description:
        type: string
      expiresAt:
        type: string
      id:
        type: integer
      logo:
        type: string
      maxDepartments:
        type: integer
      maxRoles:
        type: integer
      maxUsers:
        type: integer
      modules:
        type: string
      name:
        type: string
      status:
        type: string
    required:
    - id
    type: object
  service.UpdateUserRequest:
    properties:
      departmentId:
        type: integer
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      status:
        type: string
      username:
        type: string
    required:
    - id
    type: object
host: localhost:8000
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: DevOps 运维平台接口文档，登录后在 Authorize 中输入 Bearer {session_id} 即可调用接口
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: DevOps 运维平台 API
  version: "1.0"
paths:
  /alert/channel/upsert:
    post:
      consumes:
      - application/json
      description: 创建或更新告警通知渠道
      parameters:
      - description: 渠道配置
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 保存通知渠道
      tags:
      - 告警管理
  /alert/channels:
    get:
      description: 按类型筛选告警通知渠道
      parameters:
      - description: 渠道类型
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取通知渠道列表
      tags:
      - 告警管理
  /alert/config:
    get:
      description: 获取告警模块Alertmanager配置
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取Alertmanager配置
      tags:
      - 告警管理
  /alert/config/upsert:
    post:
      consumes:
      - application/json
      description: 创建或更新Alertmanager配置
      parameters:
      - description: Alertmanager配置
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 保存Alertmanager配置
      tags:
      - 告警管理
  /alert/history:
    get:
      description: 按状态和时间范围获取告警历史
      parameters:
      - description: 状态
        in: query
        name: status
        type: string
      - description: 开始时间(RFC3339)
        in: query
        name: start
        type: string
      - description: 结束时间(RFC3339)
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取告警历史
      tags:
      - 告警管理
  /alert/rule/toggle:
    post:
      consumes:
      - application/json
      description: 启用或禁用告警规则
      parameters:
      - description: 规则启停参数
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 规则不存在
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 启停告警规则
      tags:
      - 告警管理
