<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps 管理平台</title>
    <style>
      body {
        margin: 0;
        background: #f0f2f5;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }

      .boot-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        box-sizing: border-box;
      }

      .boot-card {
        width: min(380px, 100%);
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 24px;
        box-sizing: border-box;
        box-shadow: 0 8px 24px rgb(15 23 42 / 8%);
      }

      .boot-title {
        margin: 0;
        color: #111827;
        font-size: 22px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-shell">
        <div class="boot-card">
          <h1 class="boot-title">DevOps 管理平台</h1>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
